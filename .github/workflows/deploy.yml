name: Deploy TanStack App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Inject the Bun runtime environment into the GitHub cloud container
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. Let Bun safely install your specific TanStack project packages
      - name: Install dependencies
        run: bun install

      # 3. Securely inject your real Kobo Tokens into the compiler during build
      - name: Build project
        env:
          VITE_KOBO_TOKEN: ${{ secrets.VITE_KOBO_TOKEN }}
          VITE_KOBO_ASSET_UID: ${{ secrets.VITE_KOBO_ASSET_UID }}
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4